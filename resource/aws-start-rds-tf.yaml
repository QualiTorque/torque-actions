- name: Start AWS RDS instance 
  hosts: localhost
  connection: local
  vars:
    optional_assume_role:
      value: "{{ lookup('ansible.builtin.env', 'OPTIONAL_ASSUME_ROLE_ARN', default=undefined) }}"
  tasks:
    - name: start aws rds instance by its ID with assumed role
      when: optional_assume_role.value is defined
      block:
        - name: Assume AWS role
          amazon.aws.sts_assume_role:
            role_arn: "{{ optional_assume_role.value }}"
            role_session_name: "torque-session"
          register: assumed_role

        - name: start aws rds instance by its ID
          amazon.aws.rds_instance:
            aws_access_key: "{{ assumed_role.sts_creds.access_key }}"
            aws_secret_key: "{{ assumed_role.sts_creds.secret_key }}"
            aws_session_token: "{{ assumed_role.sts_creds.session_token }}"
            db_instance_identifier: "{{ identifier }}"
            region: "{{ (arn | split(':'))[3] }}"
            state: started
            wait: true
            
        - name: gather information about the rds instance
          amazon.aws.rds_instance:
            aws_access_key: "{{ assumed_role.sts_creds.access_key }}"
            aws_secret_key: "{{ assumed_role.sts_creds.secret_key }}"
            aws_session_token: "{{ assumed_role.sts_creds.session_token }}"
            region: "{{ (arn | split(':'))[3] }}"
            db_instance_identifier: "{{ identifier }}"
          register: result
          
        - copy:
            content: "{{ result }}"
            dest: qtorque_outputs.json

    - name: start aws rds instance by its ID with default role
      when: optional_assume_role.value is not defined
      block:
        - name: start aws rds instance by its ID
          amazon.aws.rds_instance:
            db_instance_identifier: "{{ identifier }}"
            region: "{{ (arn | split(':'))[3] }}"
            state: started
            wait: true
            
        - name: gather information about the rds instance
          amazon.aws.rds_instance:
            region: "{{ (arn | split(':'))[3] }}"
            db_instance_identifier: "{{ identifier }}"
          register: result
          
        - copy:
            content: "{{ result }}"
            dest: qtorque_outputs.json