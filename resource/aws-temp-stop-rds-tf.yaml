- name: Stop Aws RDS 
  hosts: localhost
  connection: local
  vars:
    optional_assume_role:
      value: "{{ lookup('ansible.builtin.env', 'OPTIONAL_ASSUME_ROLE_ARN', default=undefined) }}"
  tasks:
    - name: stop aws rds instance by its ID with assumed role
      when: optional_assume_role.value is defined
      block:
        - name: stop aws rds instance by its ID
          amazon.aws.rds_instance:
            db_instance_identifier: "{{ identifier }}"
            region: "{{ (arn | split(':'))[3] }}"
            state: stopped
            wait: true
        
        - name: gather information about the rds instance
          amazon.aws.rds_instance:
            region: "{{ (arn | split(':'))[3] }}"
            db_instance_identifier: "{{ identifier }}"
          register: result
          
        - copy:
            content: "{{ result }}"
            dest: qtorque_outputs.json
            
    - name: stop aws rds instance by its ID with default role
      when: optional_assume_role.value is not defined
      block:
        - name: stop aws rds instance by its ID
          amazon.aws.rds_instance:
            db_instance_identifier: "{{ identifier }}"
            region: "{{ (arn | split(':'))[3] }}"
            state: stopped
            wait: true
        
        - name: gather information about the rds instance
          amazon.aws.rds_instance:
            region: "{{ (arn | split(':'))[3] }}"
            db_instance_identifier: "{{ identifier }}"
          register: result
          
        - copy:
            content: "{{ result }}"
            dest: qtorque_outputs.json
